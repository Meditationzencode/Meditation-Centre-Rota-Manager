name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest

    # Dummy values let the build pass env-validation without exposing
    # real Supabase credentials. The Playwright suite still runs against
    # a real instance locally — see README "Testing".
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://demo.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
